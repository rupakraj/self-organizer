<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Authenticate — Self Organizer</title>
  {% include 'partials/header.html' %}
</head>
<body class="bg-gray-950 text-white flex items-center justify-center h-screen">

  <div class="flex flex-col items-center gap-6 w-full max-w-xs px-4">

    <h1 class="text-lg font-semibold tracking-widest text-gray-400 uppercase">Authenticate</h1>

    <form method="POST" action="{{ url_for('main.login') }}" class="w-full flex flex-col gap-4">
      <input
        type="password"
        name="pin"
        inputmode="numeric"
        placeholder="••••••"
        autofocus
        autocomplete="current-password"
        class="w-full text-center text-4xl tracking-[0.5em] font-mono bg-gray-900 border border-gray-700 rounded-xl px-4 py-6 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-gray-700"
      />

      {% if error %}
      <p class="text-center text-sm text-red-400">{{ error }}</p>
      {% endif %}

      <button type="submit" class="btn btn-primary w-full py-3 text-base">Enter</button>
    </form>

  </div>

</body>
</html>
